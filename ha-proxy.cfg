global

daemon
maxconn 5000000
tune.ssl.default-dh-param 2048
no strict-limits
defaults
mode http
timeout connect 500ms
timeout client 5000ms
timeout server 5000ms
frontend http-in
mode tcp

bind ${JACKTRIP_HA_IP}:53
bind ${JACKTRIP_HA_IP}:443 ssl crt /haproxy/certs.pem ssl-min-ver TLSv1.3
bind ${JACKTRIP_HA_IP}:3478 ssl crt /haproxy/certs.pem ssl-min-ver TLSv1.3
bind ${JACKTRIP_HA_IP}:4464 ssl crt /haproxy/certs.pem ssl-min-ver TLSv1.3
bind ${JACKTRIP_HA_IP}:7881 ssl crt /haproxy/certs.pem ssl-min-ver TLSv1.3
bind ${JACKTRIP_HA_IP}:8000
udp-lb udp-dns

dgram-bind ${JACKTRIP_HA_IP}:53
dgram-bind ${JACKTRIP_HA_IP}:3478 ssl crt /haproxy/certs.pem ssl-min-ver TLSv1.3
dgram-bind ${JACKTRIP_HA_IP}:50000-52000 ssl crt /haproxy/certs.pem ssl-min-ver TLSv1.3
dgram-bind ${JACKTRIP_HA_IP}:61000-63000 ssl crt /haproxy/certs.pem ssl-min-ver TLSv1.3
dgram-bind ${JACKTRIP_HA_IP}:22124 ssl crt /haproxy/certs.pem ssl-min-ver TLSv1.3

http-request set-header X-Forwarded-Proto https if { ssl_fc }
http-request set-header X-Forwarded-Proto http if !{ ssl_fc }
http-response set-header Strict-Transport-Security “max-age=16000000; includeSubDomains; preload;”

acl is_cluster hdr(host) -i ${JACKTRIP_HA_HOST}
use_backend ex_back if is_cluster

backend ex_back
balance roundrobin
option httpclose
option forwardfor
redirect scheme https code 301 if !{ ssl_fc }
proxy-requests 1
option udp-check

server dns1 ${JACKTRIP_DNS1_IP}:53 check
server dns2 ${JACKTRIP_DNS2_IP}:53 check
server dns3 ${JACKTRIP_DNS3_IP}:53 check
server dns4 ${JACKTRIP_DNS4_IP}:53 check
server s1 ${JACKTRIP_S1_IP}:3478 check
server s1 ${JACKTRIP_S1_IP}:50000-51000 check
server s1 ${JACKTRIP_S1_IP}:61000-62000 check
server s1 ${JACKTRIP_S1_IP}:22124 check
server s2 ${JACKTRIP_S2_IP}:3478 check
server s2 ${JACKTRIP_S2_IP}:51001-52000 check
server s2 ${JACKTRIP_S2_IP}:62001-63000 check
server s2 ${JACKTRIP_S2_IP}:22124 check
server s3 ${JACKTRIP_S3_IP}:3478 check
server s3 ${JACKTRIP_S3_IP}:50000-51000 check
server s3 ${JACKTRIP_S3_IP}:61000-62000 check
server s3 ${JACKTRIP_S3_IP}:22124 check
server s4 ${JACKTRIP_S4_IP}:3478 check
server s4 ${JACKTRIP_S4_IP}:51001-52000 check
server s4 ${JACKTRIP_S4_IP}:62001-63000 check
server s4 ${JACKTRIP_S4_IP}:22124 check
mode tcp
server dns1 ${JACKTRIP_DNS1_IP}:53 check
server dns2 ${JACKTRIP_DNS2_IP}:53 check
server dns3 ${JACKTRIP_DNS3_IP}:53 check
server dns4 ${JACKTRIP_DNS4_IP}:53 check
server s1 ${JACKTRIP_S1_IP}:3478 check
server s2 ${JACKTRIP_S2_IP}:3478 check
server s3 ${JACKTRIP_S3_IP}:3478 check
server s4 ${JACKTRIP_S4_IP}:3478 check
server s1 ${JACKTRIP_S1_IP}:4464 check
server s2 ${JACKTRIP_S2_IP}:4464 check
server s3 ${JACKTRIP_S3_IP}:4464 check
server s4 ${JACKTRIP_S4_IP}:4464 check
server s1 ${JACKTRIP_S1_IP}:7881 check
server s2 ${JACKTRIP_S2_IP}:7881 check
server s3 ${JACKTRIP_S3_IP}:7881 check
server s4 ${JACKTRIP_S4_IP}:7881 check
server s1 ${JACKTRIP_S1_IP}:8000 check
server s2 ${JACKTRIP_S2_IP}:8000 check
server s3 ${JACKTRIP_S3_IP}:8000 check
server s4 ${JACKTRIP_S4_IP}:8000 check





